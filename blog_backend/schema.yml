openapi: 3.0.3
info:
  title: BlogWan API 文档
  version: 1.0.0
  description: 博客平台后端 API 接口文档，包含用户认证、文章、评论、通知、积分等功能。
paths:
  /api/v1/articles/:
    get:
      operationId: api_v1_articles_list
      description: 文章视图集：提供 list, create, retrieve, update, destroy, like 操作
      parameters:
      - in: query
        name: author__username
        schema:
          type: string
      - in: query
        name: is_published
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArticleListList'
          description: ''
    post:
      operationId: api_v1_articles_create
      description: 文章视图集：提供 list, create, retrieve, update, destroy, like 操作
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArticleWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArticleWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleWrite'
          description: ''
  /api/v1/articles/{id}/:
