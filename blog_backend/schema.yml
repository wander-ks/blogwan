components:
  schemas:
    ArticleDetail:
      type: object
      description: 文章详情序列化器（包含作者详细信息）
      properties:
        id:
          type: integer
          readOnly: true
        author:
          allOf:
          - $ref: '#/components/schemas/UserProfile'
          readOnly: true
        title:
          type: string
          title: 标题
          maxLength: 200
        content:
          type: string
          title: 正文
        cover_image:
          type: string
          format: uri
          nullable: true
          title: 封面图
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 创建时间
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 更新时间
        views:
          type: integer
          readOnly: true
          title: 阅读量
        likes:
          type: integer
          readOnly: true
          title: 点赞数
        is_published:
          type: boolean
          title: 是否发布
      required:
      - author
      - content
      - created_at
      - id
      - likes
      - title
      - updated_at
      - views
    ArticleDetailRequest:
      type: object
      description: 文章详情序列化器（包含作者详细信息）
      properties:
        title:
          type: string
          minLength: 1
