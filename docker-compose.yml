services:
  mysql:
    image: mysql:5.7
    container_name: blog_mysql
    restart: unless-stopped
    ports:
      - "3309:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_HOST: "%"              # 允许外部连接
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -u root -p$$MYSQL_ROOT_PASSWORD -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blog_redis
    restart: unless-stopped
    ports:
      - "6396:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: ./backend
    container_name: blog_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/media:/app/media
      - ./backend/logs:/app/logs
    command: >
      sh -c "
        python manage.py migrate &&
        gunicorn blog_backend.wsgi:application --bind 0.0.0.0:8080 --workers 3
      "

  celery:
    build: ./backend
    container_name: blog_celery
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
      - mysql
    volumes:
      - ./backend/media:/app/media
      - ./backend/logs:/app/logs
    command: celery -A blog_backend worker -l info

  celery-beat:
    build: ./backend
    container_name: blog_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
      - mysql
    command: celery -A blog_backend beat -l info

  frontend:
    build: ./frontend
    container_name: blog_frontend
    restart: unless-stopped
    ports:
      - "9324:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data: